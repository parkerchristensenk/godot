name: "Build and Deploy Web"
on: push
jobs:
  export_web:
    runs-on: ubuntu-latest
    name: Export Web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Export
        uses: firebelley/godot-export@v6
        with:
          godot_executable_download_url: https://github.com
          godot_export_templates_download_url: https://github.com
          relative_project_path: ./
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web # The folder created by the export action
